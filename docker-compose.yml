# Phase 1+ deployment: LiteLLM data plane + Postgres, sharing one Postgres
# (separate schemas: hara-control = public, litellm = litellm).
# (Phase 0 spike does NOT need this — it runs LiteLLM via uvx, no Docker.)
#
#   cp .env.example .env   # fill UPSTREAM_API_KEY etc.
#   docker compose up -d
services:
  postgres:
    image: pgvector/pgvector:pg16 # postgres 16 + pgvector preinstalled (P0 semantic search)
    environment:
      POSTGRES_USER: hara
      POSTGRES_PASSWORD: hara
      POSTGRES_DB: hara_control
    ports:
      # 5433 on the host avoids clashing with a local/system Postgres on 5432
      # (on macOS `localhost` resolves to ::1 first and would hit the native one).
      - "5433:5432"
    volumes:
      - hara-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hara -d hara_control"]
      interval: 5s
      timeout: 3s
      retries: 10

  litellm:
    # Immutable LiteLLM 1.92.0 multi-arch index. Do not use main-stable in production: mutable tags
    # make security/version audit and deterministic rollback impossible.
    image: litellm/litellm-database:v1.92.0@sha256:64d3547e0b131bf4638342e52c12bc46d6f1d9b8498e4b731ff31be5ab316ea9
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    # let the container reach a mock/dev upstream running on the host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      UPSTREAM_API_KEY: ${UPSTREAM_API_KEY:-unused}
      UPSTREAM_BASE_URL: ${UPSTREAM_BASE_URL:-http://host.docker.internal:8899/v1}
      HARA_MOCK_BASE: ${HARA_MOCK_BASE:-http://host.docker.internal:8899/v1}
      # LiteLLM stores virtual keys + spend in this Postgres. SAME db as the control plane but a
      # SEPARATE schema (`litellm`) — they each run their own Prisma, so sharing `public` would make
      # one clobber the other's tables. Separate schemas still allow cross-schema JOINs for the
      # fleet usage view later.
      DATABASE_URL: postgresql://hara:hara@postgres:5432/hara_control?schema=litellm

  # hara-control (NestJS) — added in Phase 1.

volumes:
  hara-pgdata:
