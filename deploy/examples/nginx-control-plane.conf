# hara-control reverse proxy (nginx) — generic self-host template.
# Replace cp.example.com + the cert paths. See docs/selfhost.md §③.
#
# Routing rule that matters: a device token IS a LiteLLM virtual key, so chat goes
# straight to LiteLLM while control traffic goes to hara-control. nginx longest-prefix
# match sends /v1/chat|/v1/messages|/v1/models -> LiteLLM(4000), the rest of /v1 ->
# hara-control(4100). /admin is never public.

server {
    listen 80;
    server_name cp.example.com;
    location /.well-known/acme-challenge/ { root /var/www/html; }   # certbot renewal
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name cp.example.com;

    ssl_certificate         /etc/letsencrypt/live/cp.example.com/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/cp.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # --- data plane: chat goes to LiteLLM (longest-prefix wins over /v1/) ---
    location /v1/chat     { proxy_pass http://127.0.0.1:4000; include /etc/nginx/hara_proxy.inc; }
    location /v1/messages { proxy_pass http://127.0.0.1:4000; include /etc/nginx/hara_proxy.inc; }
    location /v1/models   { proxy_pass http://127.0.0.1:4000; include /etc/nginx/hara_proxy.inc; }

    # --- control plane: enroll / heartbeat / roles ---
    location /v1/ { proxy_pass http://127.0.0.1:4100; include /etc/nginx/hara_proxy.inc; }

    # --- admin: NEVER public. Pick one posture (see docs/selfhost.md §③). ---
    location /admin/ {
        allow 127.0.0.1;          # + `allow <your office IP>;` if you must reach it remotely
        deny all;
        proxy_pass http://127.0.0.1:4100;
        include /etc/nginx/hara_proxy.inc;
    }

    location / { return 404; }
}

# Save as /etc/nginx/hara_proxy.inc:
#   proxy_http_version 1.1;
#   proxy_set_header Host $host;
#   proxy_set_header X-Real-IP $remote_addr;
#   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#   proxy_set_header X-Forwarded-Proto $scheme;
#   proxy_read_timeout 300s;   # streaming chat
#   proxy_buffering off;       # SSE / streaming friendly
