# Publish the hara-control container image to GHCR on a version tag (v*) — so cutting a release ships a
# runnable image (`docker run ghcr.io/hara-cli/hara-control:<tag>`), mirroring hara-cli's tag→CI npm flow
# but with an IMAGE as the artifact. hara-control is a service (NestJS + Prisma/Postgres), not an npm
# package, so a container is the right channel. Auth uses the built-in GITHUB_TOKEN (packages: write) — no
# extra secret needed for GHCR under the same org. Plus a manual "Run workflow" button.
#
# NOTE (one-time): the first push creates a PRIVATE GHCR package. To let self-hosters pull anonymously,
# set the package visibility to Public in the org's Packages settings once.
name: publish-image

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # QEMU registers binfmt handlers so buildx can cross-build linux/arm64 on the x86 runner (emulated).
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/hara-cli/hara-control
          # latest=auto → the `latest` tag tracks the newest non-prerelease semver tag.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
