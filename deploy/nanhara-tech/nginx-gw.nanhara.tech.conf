# nginx site for the gw.nanhara.tech TEST gateway on the `ai` box.
# Install: copy to /etc/nginx/conf.d/gw.nanhara.tech.conf (or sites-available + symlink),
#          `nginx -t` then `systemctl reload nginx`. Issue the cert FIRST (see DEPLOY.md).
#
# Device traffic (/v1/*) is public; the admin API (/admin/*) is locked to localhost (reach it via an
# SSH tunnel: `ssh -L 4100:127.0.0.1:4100 ai`, then hit http://127.0.0.1:4100/admin/...).

server {
    listen 80;
    server_name gw.nanhara.tech;
    location /.well-known/acme-challenge/ { root /var/www/html; } # certbot http-01
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name gw.nanhara.tech;

    ssl_certificate     /etc/letsencrypt/live/gw.nanhara.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gw.nanhara.tech/privkey.pem;

    # Device-facing API: enroll / heartbeat / roles / chat (streaming). Public.
    location /v1/ {
        proxy_pass http://127.0.0.1:4100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;   # long streaming chat turns
        proxy_buffering off;       # stream tokens through
    }

    # Admin API: LOCKED to localhost. Uncomment + set your own IP to administer directly instead of via tunnel.
    location /admin/ {
        allow 127.0.0.1;
        # allow YOUR.PUBLIC.IP.HERE;
        deny all;
        proxy_pass http://127.0.0.1:4100;
        proxy_set_header Host $host;
    }

    location / { return 404; } # nothing else is served
}
