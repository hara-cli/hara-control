# R1 (HTTP-only) site for the api.nanhara.tech TEST gateway on the `ai` box.
# The R1 mock-gateway device token is low-value, so R1 validates the distributed loop over HTTP.
# Add TLS (webroot cert: certbot certonly --webroot) BEFORE R2/R3, which carry real upstream keys.
# Isolated server block (server_name api.nanhara.tech) — does not touch app.jue.zone / hc vhosts.
# /v1/* public; /admin/* localhost-only (reach via `ssh -L 4100:127.0.0.1:4100 ai`).
server {
    listen 80;
    server_name api.nanhara.tech;

    location /v1/ {
        proxy_pass http://127.0.0.1:4100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }
    location /admin/ {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:4100;
        proxy_set_header Host $host;
    }
    location / { return 404; }
}
