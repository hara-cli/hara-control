# Publish the hara-control container image to GHCR on a version tag (v*) — so cutting a release ships a
# runnable image (`docker run ghcr.io/hara-cli/hara-control:<tag>`), mirroring hara-cli's tag→CI npm flow
# but with an IMAGE as the artifact. hara-control is a service (NestJS + Prisma/Postgres), not an npm
# package, so a container is the right channel. Auth uses the built-in GITHUB_TOKEN (packages: write) — no
# extra secret needed for GHCR under the same org. Plus a manual "Run workflow" button.
#
# NOTE (one-time): the first push creates a PRIVATE GHCR package. To let self-hosters pull anonymously,
# set the package visibility to Public in the org's Packages settings once.
name: publish-image

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Require the release tag to match package.json
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          package_version="$(node -p "require('./package.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$tag_version" != "$package_version" ]; then
            echo "Release tag v${tag_version} does not match package.json ${package_version}." >&2
            exit 1
          fi
      - name: Audit production dependencies against the official registry
        run: npm audit --omit=dev --registry=https://registry.npmjs.org
      - run: npm test
      - run: npm run build
      - name: Validate the Prisma schema
        env:
          DATABASE_URL: postgresql://hara:validation-only@localhost:5432/hara_control
        run: npx prisma validate

  image:
    needs: verify
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      # QEMU registers binfmt handlers so buildx can cross-build linux/arm64 on the x86 runner (emulated).
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/hara-cli/hara-control
          # latest=auto → the `latest` tag tracks the newest non-prerelease semver tag.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy_production:
    needs: image
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: hara-control-production
    concurrency:
      group: hara-control-production
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - name: Validate the pinned production SSH target
        env:
          DEPLOY_HOST: ${{ vars.HARA_CONTROL_DEPLOY_HOST }}
          DEPLOY_PORT: ${{ vars.HARA_CONTROL_DEPLOY_PORT }}
          DEPLOY_USER: ${{ vars.HARA_CONTROL_DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.HARA_CONTROL_DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.HARA_CONTROL_DEPLOY_KNOWN_HOSTS }}
        run: |
          test -n "$DEPLOY_KEY"
          test -n "$DEPLOY_KNOWN_HOSTS"
          [[ "$DEPLOY_HOST" =~ ^[A-Za-z0-9.-]+$ ]]
          [[ "$DEPLOY_PORT" =~ ^[0-9]{1,5}$ ]]
          (( DEPLOY_PORT >= 1 && DEPLOY_PORT <= 65535 ))
          [[ "$DEPLOY_USER" =~ ^[A-Za-z_][A-Za-z0-9_-]*$ ]]
      - name: Install the dedicated restricted deploy identity
        env:
          DEPLOY_KEY: ${{ secrets.HARA_CONTROL_DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.HARA_CONTROL_DEPLOY_KNOWN_HOSTS }}
        run: |
          install -d -m 700 "$HOME/.ssh"
          umask 077
          printf '%s\n' "$DEPLOY_KEY" > "$HOME/.ssh/hara-control-deploy"
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/hara-control-deploy" "$HOME/.ssh/known_hosts"
      - name: Deploy the exact verified tag through the forced command
        env:
          DEPLOY_HOST: ${{ vars.HARA_CONTROL_DEPLOY_HOST }}
          DEPLOY_PORT: ${{ vars.HARA_CONTROL_DEPLOY_PORT }}
          DEPLOY_USER: ${{ vars.HARA_CONTROL_DEPLOY_USER }}
        run: |
          ssh \
            -i "$HOME/.ssh/hara-control-deploy" \
            -p "$DEPLOY_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "deploy $GITHUB_REF_NAME $GITHUB_SHA"
