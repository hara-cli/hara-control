# LiteLLM proxy config — the bought/embedded data plane.
# Two models registered: a local mock (Phase-0, no real key) and the real upstream.
# Clients select via the "model" field in the /v1/messages request body.

model_list:
  # ── Phase-0 spike target: local OpenAI-compatible mock, no real key ──
  - model_name: glm-mock
    litellm_params:
      model: openai/glm-mock
      # host/uvx: http://localhost:8899/v1 ; in Docker: http://host.docker.internal:8899/v1
      api_base: os.environ/HARA_MOCK_BASE
      api_key: mock-not-a-real-key
    # Synthetic non-zero prices make the local budget/spend E2E exercise real metering behavior.
    model_info:
      input_cost_per_token: 0.000001
      output_cost_per_token: 0.000001

  # ── Real upstream: DeepSeek (regular pay-as-you-go key in UPSTREAM_API_KEY; NOT a coding-plan sk-sp key) ──
  # OpenAI-compatible at https://api.deepseek.com/chat/completions (Bearer). Current models = V4
  # (deepseek-chat/-reasoner deprecate 2026-07-24). Client-facing names are stable aliases.
  - model_name: deepseek-chat
    litellm_params:
      model: openai/deepseek-v4-flash
      api_base: https://api.deepseek.com
      api_key: os.environ/UPSTREAM_API_KEY
    # DeepSeek V4 official USD/token pricing, checked 2026-07-22.
    model_info:
      input_cost_per_token: 0.00000014
      output_cost_per_token: 0.00000028
      cache_read_input_token_cost: 0.0000000028
  - model_name: deepseek-pro
    litellm_params:
      model: openai/deepseek-v4-pro
      api_base: https://api.deepseek.com
      api_key: os.environ/UPSTREAM_API_KEY
    model_info:
      input_cost_per_token: 0.000000435
      output_cost_per_token: 0.00000087
      cache_read_input_token_cost: 0.000000003625

litellm_settings:
  drop_params: true
  # Route Anthropic /v1/messages through OpenAI /chat/completions, NOT the Responses API.
  # Required: OpenAI-compatible upstreams (DashScope/Qwen/GLM compatible-mode) only expose
  # /chat/completions, not /v1/responses. Without this, /v1/messages 404s against them.
  use_chat_completions_url_for_anthropic_messages: true

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
